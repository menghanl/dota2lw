<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0b0e14">
<!-- liquipedia 403s hotlinked images with a foreign Referer; SVG <image> can't
     set referrerpolicy per-element, so drop referrers page-wide -->
<meta name="referrer" content="no-referrer">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>">
<title>Match Center — Liquipedia Mobile</title>
<link rel="stylesheet" href="common.css">
<script>
  /* set theme before first paint (worldcup2026 pattern) */
  (function () { try {
    var p = localStorage.getItem('lp-theme') || 'system';
    document.documentElement.dataset.theme =
      p === 'system' ? (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light') : p;
  } catch (e) {} })();
</script>
</head>
<body>
<header class="app-header">
  <div class="bar">
    <div class="brand">
      <img id="eventLogo" class="event-logo hidden" alt="" referrerpolicy="no-referrer">
      <h1 id="eventName">Loading…</h1>
    </div>
    <div class="updated" id="updated"></div>
    <button class="icon-btn" id="menuBtn" title="Settings">⚙</button>
    <button class="icon-btn" id="refreshBtn" title="Refresh">↻</button>
  </div>
</header>

<main class="wrap" id="main">
  <div class="loading" id="loading"><div class="spinner"></div>Fetching from Liquipedia…</div>
</main>

<button id="todayBtn">↓ Today</button>
<div id="banner">Couldn’t update — retrying</div>
<div id="toast"></div>

<div id="menuBackdrop"></div>
<div class="menu" id="menu">
  <div class="m-title">Auto-refresh</div>
  <div class="m-row" id="modeRow"></div>
  <div class="m-title">Theme</div>
  <div class="m-row" id="themeRow"></div>
</div>

<nav class="tabbar">
  <div class="tabs" id="tabs"></div>
</nav>

<script src="lp.js"></script>
<script src="ui.js"></script>
<script src="metro.js"></script>
<script>
'use strict';
const { h, teamImg } = UI;

const params = new URLSearchParams(location.search);
const PAGE = params.get('page') || 'Esports_World_Cup/2026';
const SRC = params.get('src') || 'live';

/* tabs: Matches | Groups | <one per bracket, e.g. Survival / Playoffs> | Info */
const slug = s => s.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
const shortName = s => { const w = s.split(/[\s/]+/)[0]; return w.length > 10 ? w.slice(0, 9) + '…' : w; };

let model = null;
let TABS = [];
function computeTabs() {
  const bracketTabs = (model ? model.brackets : []).map((b, i) => ({
    id: 'b-' + slug(b.name),
    label: shortName(b.name),
    glyph: i === model.brackets.length - 1 ? '🏆' : '🛡',
    bracket: i,
  }));
  TABS = [
    { id: 'matches', label: 'Matches', glyph: '⚔' },
    { id: 'groups',  label: 'Groups',  glyph: '▦' },
    ...bracketTabs,
    { id: 'info',    label: 'Info',    glyph: 'ℹ' },
  ];
}
computeTabs();

function normalizeTab(id) {
  // legacy hashes from older builds / deep links
  if (id === 'teams' || id === 'event') return 'info';
  if (id === 'knockout') { const b = TABS.find(t => t.bracket != null); return b ? b.id : 'matches'; }
  return TABS.some(t => t.id === id) ? id : 'matches';
}

let activeTab = (location.hash || '#matches').slice(1);
let matchFilter = 'all';
let didAutoScroll = false;

/* ================= settings: refresh mode + theme (worldcup2026) ========= */
const MODES = ['smart', '60', '300', 'off'];
const MODE_LABEL = { smart: 'auto', 60: '1m', 300: '5m', off: 'off' };
let refreshMode = localStorage.getItem('lp-refresh') || 'smart';
if (!MODES.includes(refreshMode)) refreshMode = 'smart';
let refreshTimer = null, lastUpdated = null, fetching = false;

const THEMES = ['system', 'light', 'dark'];
let themePref = localStorage.getItem('lp-theme') || 'system';

function applyTheme() {
  document.documentElement.dataset.theme =
    themePref === 'system' ? (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light') : themePref;
  setEventLogo();
  render();  // re-pick logo variants
}
matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => { if (themePref === 'system') applyTheme(); });

function buildMenu() {
  const modeRow = document.getElementById('modeRow');
  modeRow.innerHTML = '';
  for (const m of MODES)
    modeRow.append(h('button', { class: refreshMode === m ? 'sel' : '', onclick: () => setRefreshMode(m) }, MODE_LABEL[m]));
  const themeRow = document.getElementById('themeRow');
  themeRow.innerHTML = '';
  for (const t of THEMES)
    themeRow.append(h('button', { class: themePref === t ? 'sel' : '', onclick: () => {
      themePref = t; localStorage.setItem('lp-theme', t); buildMenu(); applyTheme();
    } }, t));
}
function toggleMenu(open) {
  document.getElementById('menu').classList.toggle('open', open);
  document.getElementById('menuBackdrop').classList.toggle('open', open);
}
document.getElementById('menuBtn').addEventListener('click', () => { buildMenu(); toggleMenu(true); });
document.getElementById('menuBackdrop').addEventListener('click', () => toggleMenu(false));

function setRefreshMode(m) {
  refreshMode = m;
  localStorage.setItem('lp-refresh', m);
  buildMenu(); updatedLabel(); toggleMenu(false);
  if (m !== 'off' && lastUpdated && Date.now() - lastUpdated > 60000) fetchData();
  else scheduleRefresh();
}

function scheduleRefresh() {
  clearTimeout(refreshTimer);
  if (refreshMode === 'off' || !model) return;
  let ms;
  if (refreshMode === 'smart') {
    const now = Date.now() / 1000;
    const anyLive = model.matches.some(m => UI.matchState(m, now) === 'live');
    const next = model.matches.find(m => UI.matchState(m, now) === 'upcoming' && m.ts);
    ms = 10 * 60 * 1000;                                        // idle: 10 min
    if (anyLive) ms = 60 * 1000;                                // live: 1 min
    else if (next && next.ts - now < 30 * 60) ms = 2 * 60 * 1000; // near start: 2 min
  } else {
    ms = Number(refreshMode) * 1000;
  }
  refreshTimer = setTimeout(() => fetchData(), ms);
}

function updatedLabel() {
  const when = lastUpdated ? 'updated ' + UI.fmtTime.format(new Date(lastUpdated)) + ' · ' : '';
  document.getElementById('updated').textContent = when + MODE_LABEL[refreshMode];
}

/* ================= toast + banner + title ================= */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => t.classList.remove('show'), 4200);
}
function showBanner(on) {
  document.getElementById('banner').classList.toggle('show', on);
}
function seriesKey(m) {
  return [(m.team1 || {}).name, (m.team2 || {}).name, m.ts].join('|');
}
function detectChanges(oldM, newM) {
  if (!oldM) return;
  const prev = new Map(oldM.matches.map(m => [seriesKey(m), m]));
  for (const m of newM.matches) {
    const o = prev.get(seriesKey(m));
    if (!o || !m.team1 || !m.team2) continue;
    const scoreChanged = (o.score1 !== m.score1 || o.score2 !== m.score2) && m.score1 != null;
    const justFinished = !o.finished && m.finished;
    if (scoreChanged || justFinished) {
      showToast(`${m.team1.name} ${m.score1 != null ? m.score1 : ''}–${m.score2 != null ? m.score2 : ''} ${m.team2.name}${justFinished ? ' · final' : ''}`);
      break;  // one toast per refresh is enough
    }
  }
}
function updateTitle() {
  const live = model && model.matches.find(m => UI.matchState(m) === 'live' && m.team1 && m.team2);
  document.title = live
    ? `${(live.team1.short || live.team1.name)} ${live.score1 != null ? live.score1 : 0}–${live.score2 != null ? live.score2 : 0} ${(live.team2.short || live.team2.name)} · LP`
    : (model && model.info.name ? model.info.name + ' — Live' : 'Match Center');
}

/* ================= tabs ================= */
function buildTabBar() {
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = '';
  for (const t of TABS) {
    tabsEl.append(h('button', { id: 'tab-' + t.id, onclick: () => setTab(t.id) },
      h('span', { class: 'glyph' }, t.glyph), t.label));
  }
}
buildTabBar();
function setTab(id) {
  activeTab = id;
  history.replaceState(null, '', '#' + id);
  render();
}
window.addEventListener('hashchange', () => {
  const id = normalizeTab(location.hash.slice(1));
  if (id !== activeTab) { activeTab = id; render(); }
});

/* ================= data ================= */
function setEventLogo() {
  if (!model) return;
  const logo = document.getElementById('eventLogo');
  const name = document.getElementById('eventName');
  const src = (UI.isLight() && model.info.logoL) ? model.info.logoL : model.info.logo;
  if (src) {
    // logo is a wordmark — show it INSTEAD of the text title
    logo.alt = model.info.name || PAGE;
    logo.onerror = () => { logo.classList.add('hidden'); name.classList.remove('hidden'); };
    logo.src = src;
    logo.classList.remove('hidden');
    name.classList.add('hidden');
  } else {
    logo.classList.add('hidden');
    name.classList.remove('hidden');
  }
}

function afterModel() {
  document.getElementById('eventName').textContent = model.info.name || PAGE;
  setEventLogo();
  computeTabs();
  buildTabBar();
  activeTab = normalizeTab(activeTab);
  render();
}

/* stage-aware selective refresh: only re-fetch the wiki page that can change.
 * groups running  -> /Group_Stage only (1 request, no rate-limit sleep)
 * groups finished / knockout near or live -> main page only
 * both in motion (transition days) -> both                               */
function whichPages() {
  const now = Date.now() / 1000;
  const isGroup = m => /^Group/.test(m.stage || '');
  const groupActive = model.groups.length > 0 &&
    model.matches.some(m => isGroup(m) && UI.matchState(m, now) !== 'finished');
  const groupsDone = model.groups.length > 0 && !groupActive;
  const bracketSoon = model.matches.some(m => !isGroup(m) && UI.matchState(m, now) !== 'finished' &&
    ((m.team1 && m.team1.name) || (m.team2 && m.team2.name) || (m.ts && m.ts - now < 36 * 3600)));
  const needMain = groupsDone || bracketSoon || !model.groups.length;
  if (groupActive && needMain) return 'both';
  return groupActive ? 'group' : 'main';
}

async function fetchData(manual = false, first = false) {
  if (fetching) return;

  // stale-while-revalidate: paint whatever we have, instantly
  if (first) {
    const cached = LP.getCached(PAGE, SRC);
    if (cached) {
      model = cached;
      lastUpdated = cached.fetchedAt;
      afterModel();
      updateTitle();
      updatedLabel();
      if (Date.now() - cached.fetchedAt < LP.CACHE_TTL_MS) { scheduleRefresh(); return; }
      // stale: fall through and revalidate in the background
    }
  }

  fetching = true;
  const btn = document.getElementById('refreshBtn');
  btn.style.opacity = .4;
  try {
    const prevFull = model && !model.partial ? model : null;
    const only = (manual || !model) ? 'both' : whichPages();
    console.debug('[fetch] pages =', only);
    const fresh = await LP.loadTournament(PAGE, {
      src: SRC, force: true, only,
      // progressive cold start: render bracket/teams/info from the main page
      // while the group page is still being fetched
      onPartial: !model ? (pm) => { pm.partial = true; model = pm; afterModel(); } : undefined,
    });
    detectChanges(prevFull, fresh);
    model = fresh;
    lastUpdated = Date.now();
    showBanner(false);
    afterModel();
  } catch (e) {
    console.warn('refresh failed', e);
    if (!model) {
      const main = document.getElementById('main');
      main.innerHTML = '';
      main.append(h('div', { class: 'error-box' }, 'Could not load: ' + (e.message || e)),
        h('button', { class: 'icon-btn', onclick: () => fetchData(true, true) }, 'Retry'));
    } else {
      showBanner(true);                      // stale data stays on screen
      setTimeout(() => showBanner(false), 5000);
    }
  } finally {
    fetching = false;
    btn.style.opacity = 1;
    updatedLabel();
    updateTitle();
    scheduleRefresh();
  }
}
document.getElementById('refreshBtn').addEventListener('click', () => fetchData(true));

/* ================= render ================= */
function render() {
  for (const t of TABS) {
    const btn = document.getElementById('tab-' + t.id);
    if (btn) btn.classList.toggle('active', t.id === activeTab);
  }
  const main = document.getElementById('main');
  main.innerHTML = '';
  if (!model) return;
  const tab = TABS.find(t => t.id === activeTab) || TABS[0];
  if (tab.bracket != null) {
    renderBracketTab(main, tab);
  } else {
    ({ matches: renderMatches, groups: renderGroups, info: renderInfo })[tab.id](main);
    if (tab.id !== 'matches')   // matches puts attribution inside its scroller
      main.append(h('div', { class: 'attribution' },
        'Data & images from ', h('a', { href: model.url, target: '_blank', rel: 'noopener' }, 'Liquipedia'),
        ' (CC BY-SA 3.0) · unofficial demo'));
  }
  document.getElementById('todayBtn').style.display =
    (activeTab === 'matches' && model.matches.length) ? 'block' : 'none';
  updatedLabel();
}

/* ---------------- matches ---------------- */
function renderMatches(main) {
  const now = Date.now() / 1000;
  const wrap = h('div', { class: 'matches-wrap' });
  main.append(wrap);

  // hero: live series (max 2 pinned), else next upcoming (worldcup2026 pattern)
  const live = model.matches.filter(m => UI.matchState(m, now) === 'live' && m.team1 && m.team2);
  const next = model.matches.find(m => UI.matchState(m, now) === 'upcoming' && m.ts);
  const hero = h('section', { class: 'hero' });
  if (live.length) live.slice(0, 2).forEach(m => hero.append(UI.heroCard(m, 'live')));
  else if (next) hero.append(UI.heroCard(next, 'next'));
  hero.querySelectorAll('.hero-card').forEach(c =>
    c.addEventListener('click', () => {
      const el = document.getElementById('m-' + c.dataset.mid);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }));
  wrap.append(hero);
  if (live.length > 2)
    wrap.append(h('div', { class: 'hero-more', onclick: () => scrollToCurrent(true) },
      `+${live.length - 2} more live ↓`));

  const filters = [
    { id: 'all', label: 'All' },
    ...model.groups.map(g => ({ id: g.name, label: g.name.replace('Group ', 'Grp ') })),
    { id: 'ko', label: 'Knockout' },
  ];
  wrap.append(h('div', { class: 'chip-bar' }, filters.map(f =>
    h('button', { class: 'chip-tab' + (matchFilter === f.id ? ' active' : ''), onclick: () => { matchFilter = f.id; render(); } }, f.label))));

  // schedule scrolls in its own pane; hero + chips stay pinned above it
  const scroller = h('div', { class: 'scroller' });
  wrap.append(scroller);

  if (model.partial)
    scroller.append(h('div', { class: 'sub', style: 'display:flex;gap:8px;align-items:center' },
      h('span', { class: 'spinner', style: 'width:12px;height:12px;border-width:2px;margin:0' }),
      'Loading group stage…'));

  let ms = model.matches;
  if (matchFilter === 'ko') ms = ms.filter(m => !/^Group/.test(m.stage || ''));
  else if (matchFilter !== 'all') ms = ms.filter(m => (m.stage || '') === matchFilter);
  if (!ms.length) { scroller.append(h('div', { class: 'loading' }, 'No matches.')); return; }

  const days = new Map();
  for (const m of ms) {
    const key = m.ts ? UI.dayKey(m.ts) : 'tbd';
    if (!days.has(key)) days.set(key, { ts: m.ts, list: [] });
    days.get(key).list.push(m);
  }
  for (const [key, day] of days) {
    const rel = day.ts ? UI.relDay(day.ts) : null;
    const head = h('div', { class: 'day-head' },
      rel ? [h('span', { class: 'today-tag' }, rel), ' · '] : null,
      key === 'tbd' ? 'Date TBD' : UI.fmtDay.format(new Date(day.ts * 1000)));
    const cards = day.list.map(m => { const c = UI.matchCard(m); c.id = 'm-' + m.id; return c; });
    scroller.append(h('section', { class: 'day', 'data-day': key }, head, ...cards));
  }
  scroller.append(h('div', { class: 'attribution' },
    'Data & images from ', h('a', { href: model.url, target: '_blank', rel: 'noopener' }, 'Liquipedia'),
    ' (CC BY-SA 3.0) · unofficial demo'));
  maybeAutoScroll();
}

/* live > next upcoming > last day (worldcup2026 pattern) */
function scrollToCurrent(smooth) {
  const now = Date.now() / 1000;
  const target = model.matches.find(m => UI.matchState(m, now) === 'live')
    || model.matches.find(m => UI.matchState(m, now) === 'upcoming');
  let el = target && document.getElementById('m-' + target.id);
  if (el) el = el.closest('.day');
  if (!el) { const secs = document.querySelectorAll('.day'); el = secs[secs.length - 1]; }
  if (el) el.scrollIntoView({ behavior: smooth ? 'smooth' : 'auto', block: 'start' });
}
function maybeAutoScroll() {
  if (didAutoScroll || activeTab !== 'matches' || !model.matches.length) return;
  didAutoScroll = true;
  const first = model.matches.find(m => m.ts);
  if (first && UI.dayKey(first.ts) < UI.dayKey(Date.now() / 1000))
    requestAnimationFrame(() => scrollToCurrent(false));
}
document.getElementById('todayBtn').addEventListener('click', () => scrollToCurrent(true));

/* ---------------- groups ---------------- */
function renderGroups(main) {
  if (!model.groups.length) { main.append(h('div', { class: 'loading' }, 'No group data.')); return; }
  main.append(UI.promoLegend(model.groups) || '');
  for (const g of model.groups) {
    main.append(h('div', { class: 'section-title' }, g.name), UI.standingsTable(g));
    const gm = model.matches.filter(m => m.stage === g.name);
    if (gm.length) {
      const done = gm.filter(m => UI.matchState(m) === 'finished').length;
      main.append(h('details', {},
        h('summary', { class: 'sub', style: 'padding:8px 2px;cursor:pointer' }, `Matches (${done}/${gm.length} played)`),
        gm.map(m => UI.matchCard(m, { showStage: false }))));
    }
  }
}

/* ---------------- bracket tabs: metro map + lens per bracket ---------------- */
function renderBracketTab(main, tab) {
  const bracket = model.brackets[tab.bracket];
  if (!bracket) { main.append(h('div', { class: 'loading' }, 'No bracket data yet.')); return; }
  Metro.mount(main, [bracket], { key: PAGE + '#' + tab.id });
}

/* ---------------- info: teams + event details ---------------- */
function renderTeamsSection(main) {
  main.append(h('div', { class: 'section-title' }, `Teams (${model.teams.length})`));
  const grid = h('div', { class: 'teams-grid' });
  for (const t of model.teams) {
    const card = h('div', { class: 'team-card' },
      h('div', { class: 'team-card-head' },
        teamImg(t),
        h('span', { class: 'tname' }, t.name),
        h('span', { class: 'qual' }, t.qualifier || '')),
      h('div', { class: 'roster' },
        t.roster.map(p => h('div', { class: 'roster-row' },
          UI.img(p.flag, 'flag-img', p.country),
          h('span', { class: 'role' }, isNaN(+p.role) ? p.role : 'Pos ' + p.role),
          h('span', {}, p.name),
          p.trophies ? h('span', { class: 'trophy' }, '🏆'.repeat(Math.min(p.trophies, 3))) : null)),
        h('div', { style: 'margin-top:8px' },
          h('a', { href: t.page, target: '_blank', rel: 'noopener', class: 'tiny' }, 'Liquipedia page ↗'))));
    card.addEventListener('click', e => { if (!e.target.closest('a')) card.classList.toggle('open'); });
    grid.append(card);
  }
  main.append(grid);
}

function renderInfo(main) {
  renderTeamsSection(main);
  const f = model.info.fields || {};
  const rows = ['Series', 'Organizers', 'Type', 'Location', 'Venue', 'Format', 'Prize Pool', 'Start Date', 'End Date', 'Liquipedia Tier', 'Teams']
    .filter(k => f[k]).map(k => h('div', { class: 'kv' }, h('span', { class: 'k' }, k), h('span', { class: 'v' }, f[k])));
  main.append(h('div', { class: 'section-title' }, 'Event'), h('div', { class: 'card-box' }, rows));

  if (model.format)
    main.append(h('div', { class: 'section-title' }, 'Format'),
      h('div', { class: 'card-box format-html', html: model.format }));

  if (model.prizes.length)
    main.append(h('div', { class: 'section-title' }, 'Prize Pool'),
      h('div', { class: 'standings' }, model.prizes.map(p =>
        h('div', { class: 'prize-row' },
          h('span', { class: 'prize-place' }, p.place),
          p.logo ? teamImg(p) : null,
          h('span', { style: 'min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap' }, p.team || '—'),
          h('span', { class: 'prize-usd' }, p.usd ? '$' + p.usd.replace(/^\$/, '') : '')))));

  main.append(h('div', { style: 'margin-top:14px' },
    h('a', { class: 'link-btn', href: model.url, target: '_blank', rel: 'noopener' }, 'Open on Liquipedia ↗')));
}

/* ================= tickers ================= */
setInterval(() => {
  UI.tickCountdowns();
}, 1000);

document.addEventListener('visibilitychange', () => {
  // catch up when the tab becomes visible again (mobile background)
  if (!document.hidden && refreshMode !== 'off' && lastUpdated && Date.now() - lastUpdated > 90000) fetchData();
});

fetchData(false, true);
</script>
</body>
</html>
